<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}" type="text/css">
    <link rel="stylesheet" th:href="@{/css/admin/dashboardAdmin.css}" type="text/css">
</head>

<body>
<!--<header th:replace="presentation/fragments/headerAdmin :: headerAdmin"></header>-->
<header th:replace="presentation/fragments/header :: header"></header>

<main class="admin-dashboard">
    <div class="admin-dashboard__container">

        <h1 class="admin-dashboard__title">Administrador</h1>
        <p class="admin-dashboard__subtitle">
            Aprobaciones, catálogo de características y reportes.
        </p>

        <div class="admin-dashboard__actions">
            <a class="admin-dashboard__link" th:href="@{/presentation/admin/empresas-pendientes}">
                <button class="admin-dashboard__button" type="button">Empresas pendientes</button>
            </a>

            <a class="admin-dashboard__link" th:href="@{/presentation/admin/oferentes-pendientes}">
                <button class="admin-dashboard__button" type="button">Oferentes pendientes</button>
            </a>

            <a class="admin-dashboard__link" th:href="@{/presentation/admin/caracteristicas}">
                <button class="admin-dashboard__button" type="button">Características</button>
            </a>

            <a class="admin-dashboard__link" href="#">
                <button class="admin-dashboard__button" type="button">Reportes</button>
            </a>
        </div>

    </div>
</main>

<footer class="footer">
    <div class="footer__info">
        <strong>Bolsa de Empleo</strong><br>
        Total Soft Inc.
    </div>

    <div class="footer__info">
        Contacto: info@bolsaempleo.local<br>
        Créditos: Equipo de desarrollo
    </div>
</footer>

</body>
</html>
