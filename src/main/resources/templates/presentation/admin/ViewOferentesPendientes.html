<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Oferentes Pendientes</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}" type="text/css">
    <link rel="stylesheet" th:href="@{/css/admin/aprobaciones.css}" type="text/css">
</head>
<body>

<!--<header th:replace="presentation/fragments/headerAdmin :: headerAdmin"></header>-->
<header th:replace="presentation/fragments/header :: header"></header>

<main class="aprobaciones">
    <div class="aprobaciones__container">
        <h2 class="aprobaciones__title">Oferentes pendientes</h2>

        <div class="aprobaciones__card">
            <table class="aprobaciones__table">
                <thead class="aprobaciones__head">
                <tr class="aprobaciones__row">
                    <th class="aprobaciones__cell">Usuario</th>
                    <th class="aprobaciones__cell aprobaciones__cell--action">Acción</th>
                </tr>
                </thead>

                <tbody>
                <tr class="aprobaciones__row" th:each="o : ${oferentes}">
                    <td class="aprobaciones__cell" th:text="${o.nombre}"></td>
                    <td class="aprobaciones__cell aprobaciones__cell--action">
                        <form class="aprobaciones__form"
                              th:action="@{/presentation/admin/autorizarOferente/{id}(id=${o.id})}"
                              method="post">
                            <button class="aprobaciones__button" type="submit">
                                Aprobar y generar clave
                            </button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>
<footer th:replace="presentation/fragments/Footer :: footer"></footer>
</body>
</html>
