<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8">
  <title>Bolsa de Empleo</title>
  <link rel="stylesheet" th:href="@{/css/styles.css}" type="text/css">
  <link rel="stylesheet" th:href="@{/css/publico/principal.css}" type="text/css">
</head>
<body class="page">

<header th:replace="presentation/fragments/header :: header"></header>
<header th:replace="presentation/fragments/headerAdmin :: header"></header>
<header th:replace="presentation/fragments/headerEmpresa :: header"></header>

<main class="page__main">
  <div class="container page__container">

    <h1 class="page__title">Bolsa de Empleo</h1>
    <p class="page__subtitle">Últimos 5 puestos públicos</p>

    <p class="page__empty" th:if="${#lists.isEmpty(puestos)}">
      No hay puestos disponibles.
    </p>

    <div class="jobs" th:unless="${#lists.isEmpty(puestos)}">

      <div class="jobs__card card" th:each="p : ${puestos}">

        <h3 class="card__title" th:text="${p.empresa.nombre}"></h3>

        <p class="card__description" th:text="${p.descripcion}"></p>

        <p class="card__salary"
           th:text="'₡ ' + ${#numbers.formatDecimal(p.salario,1,'POINT',2,'COMMA')}">
        </p>

        <div class="card__details-toggle detalleDespliegue">

          <button class="card__button detalleBtn">
            Ver detalle
          </button>

          <div class="card__details detalle">

            <strong class="card__details-title" th:text="${p.descripcion}"></strong>

            <ul class="card__list">
              <li class="card__list-item" th:each="pc : ${p.puestocaracteristicas}">
                <span class="card__skill" th:text="${pc.caracteristica.nombre}"></span>
                -
                Nivel:
                <span class="card__level" th:text="${pc.nivel}"></span>
              </li>
            </ul>

          </div>
        </div>

      </div>

    </div>
  </div>
</main>

<footer class="page__footer" th:replace="presentation/fragments/Footer :: footer"></footer>

</body>
</html>
