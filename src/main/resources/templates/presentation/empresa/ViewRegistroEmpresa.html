<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Registrar Empresa</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}" type="text/css">
</head>

<body>
<header th:replace="presentation/fragments/header :: header"></header>
<main>
    <div class="form-container">
        <h2>Registro de Empresa</h2>

        <form method="POST" th:object="${empresa}" th:action="@{/presentation/empresa/crear-empresa}">

            <label>Nombre del usuario</label>
            <input type="text" name="nombreUsuario" required>

            <label>Clave</label>
            <input type="password" name="clave" required>

            <label>Nombre de la empresa</label>
            <input type="text" th:field="*{nombre}" required>

            <label>Localización</label>
            <input type="text" th:field="*{localizacion}" required>

            <label>Correo electrónico</label>
            <input type="email" th:field="*{correoElectronico}" required>

            <label>Teléfono</label>
            <input type="text" th:field="*{telefono}" required>

            <label>Descripción</label>
            <textarea th:field="*{descripcion}" required></textarea>

            <button type="submit">Guardar Empresa</button>

        </form>
    </div>
</main>

<footer>

    <div>
        <strong>Bolsa de Empleo</strong><br>
        Total Soft Inc.
    </div>

    <div>
        Contacto: info@bolsaempleo.local<br>
        Créditos: Equipo de desarrollo
    </div>
</footer>
</body>

</html>
