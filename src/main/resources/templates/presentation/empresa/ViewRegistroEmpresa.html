<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Registrar Empresa</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}" type="text/css">
</head>

<body>
<header class="navbar">

  <div class="logo">
    <img src="/images/logo.png" alt="logo">
    <span>BolsaEmpleo</span>

    <nav>
      <a href="/">Buscar puestos</a>
      <a href="/presentation/empresa/registrar">Registro Empresa</a>
      <a href="/">Registro Oferente</a>
    </nav>

  </div>


  <div class="login">
    <a href="/">Login</a>
  </div>

</header>

<main>
  <div class="form-container">
    <h2>Registro de Empresa</h2>

    <form th:object="${empresa}" action="/empresa/crearEmpresa" method="POST">

      <label>ID de la empresa</label>
      <input type="text" th:field="*{id}" required>

      <label>Nombre de la empresa</label>
      <input type="text" th:field="*{nombre}" required>

      <label>Localización</label>
      <input ttype="text" th:field="*{localizacion}"  required>

      <label>Correo electrónico</label>
      <input type="text" th:field="*{correoElectronico}"  required>

      <label>Teléfono</label>
      <input type="text" th:field="*{telefono}"  required>

      <label>Descripción</label>
      <textarea type="text" th:field="*{descripcion}" required></textarea>

      <button type="submit">Guardar Empresa</button>

    </form>
  </div>
</main>

</body>
</html>
