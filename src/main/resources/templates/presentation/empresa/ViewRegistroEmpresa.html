<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Registrar Empresa</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}" type="text/css">
</head>

<body>
<header th:replace="presentation/fragments/header :: header"></header>
<main>
  <div class="form-container">
    <h2>Registro de Empresa</h2>

    <form method="POST" th:object="${empresa}" action="/empresa/crearEmpresa" >

      <label>ID de la empresa</label>
      <input type="text" th:field="*{id}" required>

      <label>Nombre de la empresa</label>
      <input type="text" th:field="*{nombre}" required>

      <label>Localización</label>
      <input type="text" th:field="*{localizacion}"  required>

      <label>Correo electrónico</label>
      <input type="text" th:field="*{correoElectronico}"  required>

      <label>Teléfono</label>
      <input type="text" th:field="*{telefono}"  required>

      <label>Descripción</label>
      <textarea type="text" th:field="*{descripcion}" required></textarea>

      <button type="submit">Guardar Empresa</button>

    </form>
  </div>
</main>

<footer>

  <div>
    <strong>Bolsa de Empleo</strong><br>
    Total Soft Inc.
  </div>

  <div>
    Contacto: info@bolsaempleo.local<br>
    Créditos: Equipo de desarrollo
  </div>
</footer>
</body>

</html>
