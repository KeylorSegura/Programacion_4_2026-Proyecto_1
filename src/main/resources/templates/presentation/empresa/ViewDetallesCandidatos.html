<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Empresa - Detalles candidato</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}" type="text/css">
    <link rel="stylesheet" th:href="@{/css/empresa/detallesCandidatos.css}" type="text/css">
</head>
<body>
<header th:replace="presentation/fragments/header :: header"></header>

<main class="candidato-detalle">
    <h1 class="candidato-detalle__title">Detalle del oferente</h1>

    <div class="boton">
        <a target="_blank" th:href="@{/presentation/empresa/candidatos/oferente/verCV(id=${oferente.id})}">
            <button type="button">Ver CV</button>
        </a>
    </div>

    <section class="candidato-detalle__info">
        <h2 class="candidato-detalle__info-title">Detalle de oferente</h2>
        <h3 class="candidato-detalle__name">
            <span th:text="${oferente.nombre+ ' ' +oferente.primerApellido}"></span>
        </h3>
        <ul class="candidato-detalle__list">
            <li class="candidato-detalle__list-item">Identificación: <span th:text="${oferente.id}"></span></li>
            <li class="candidato-detalle__list-item">Email: <span th:text="${oferente.correoElectronico}"></span></li>
            <li class="candidato-detalle__list-item">Teléfono: <span th:text="${oferente.telefono}"></span></li>
            <li class="candidato-detalle__list-item">Residencia: <span th:text="${oferente.lugarResidencia}"></span>
            </li>
        </ul>
    </section>

    <section class="candidato-detalle__habilidades">
        <h3 class="candidato-detalle__habilidades-title">Habilidades</h3>
        <table class="candidato-detalle__table">
            <thead class="candidato-detalle__table-head">
            <tr class="candidato-detalle__row candidato-detalle__row--header">
                <th class="candidato-detalle__cell candidato-detalle__cell--header">Caracteristica</th>
                <th class="candidato-detalle__cell candidato-detalle__cell--header">Nivel</th>
            </tr>
            </thead>
            <tbody class="candidato-detalle__table-body">
            <tr class="candidato-detalle__row" th:each="oc : ${oferente.oferentecaracteristicas}">
                <td class="candidato-detalle__cell" th:text="${oc.caracteristica.nombre}"></td>
                <td class="candidato-detalle__cell candidato-detalle__cell--nivel" th:text="${oc.nivel}"></td>
            </tr>
            </tbody>
        </table>
    </section>

    <div class="candidato-detalle__volver">
        <button type="button" onclick="history.back()">Volver</button>
    </div>
</main>
</body>
</html>
