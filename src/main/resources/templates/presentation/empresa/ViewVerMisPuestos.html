<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Empresa - Mis puestos</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}" type="text/css">
    <link rel="stylesheet" th:href="@{/css/empresa/verMisPuestos.css}" type="text/css">
</head>
<body>
<header th:replace="presentation/fragments/header :: header"></header>
<main class="mis-puestos">
    <div class="mis-puestos__header">
        <h1 class="mis-puestos__title">Mis Puestos</h1>
        <button class="mis-puestos__new-btn">
            <a class="mis-puestos__new-link" href="/presentation/empresa/puesto/registrar">Publicar puesto</a>
        </button>
    </div>

    <table class="mis-puestos__table">
        <thead>
        <tr>
            <th class="mis-puestos__cell--header">ID</th>
            <th class="mis-puestos__cell--header">Descripción</th>
            <th class="mis-puestos__cell--header">Salario</th>
            <th class="mis-puestos__cell--header">Estado</th>
            <th class="mis-puestos__cell--header">Acciones</th>
        </tr>
        </thead>
        <tbody>
        <tr class="mis-puestos__row" th:each="puesto : ${empresa.puestos}">
            <td class="mis-puestos__cell" th:text="${puesto.id}"></td>
            <td class="mis-puestos__cell" th:text="${puesto.descripcion}"></td>
            <td class="mis-puestos__cell" th:text="${puesto.salario}"></td>
            <td class="mis-puestos__cell mis-puestos__cell--estado"
                th:text="${puesto.activo == 1} ? 'Activo' : 'Inactivo'"></td>
            <td class="mis-puestos__cell mis-puestos__cell--acciones">
                <form class="mis-puestos__toggle-form"
                      th:action="@{/presentation/empresa/puesto/toggle-activo/{id}(id=${puesto.id})}" method="post">
                    <button class="mis-puestos__btn mis-puestos__btn--toggle" type="submit"
                            th:text="${puesto.activo == 1} ? 'Desactivar' : 'Activar'">
                    </button>
                </form>
                <button class="mis-puestos__btn mis-puestos__btn--candidatos">
                    <a class="mis-puestos__btn-link"
                       th:href="@{/presentation/empresa/candidatos/puesto(id=${puesto.id})}">Mostrar Candidatos</a>
                </button>
            </td>
        </tr>
        </tbody>
    </table>
</main>
<footer th:replace="presentation/fragments/Footer :: footer"></footer>
</body>
</html>
