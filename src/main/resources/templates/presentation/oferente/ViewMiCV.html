<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mi CV</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}" type="text/css">
    <link rel="stylesheet" th:href="@{/css/oferente/miCV.css}" type="text/css">
</head>
<body>
<header class="page__header" th:replace="presentation/fragments/header :: header"></header>

<main class="main">
    <div class="main__container page">
        <h1 class="page__title">Mi CV</h1>


        <form class="cv-form" th:action="@{/presentation/oferente/subirCV}" enctype="multipart/form-data" method="post">

            <div class="cv-form__field">
                <label class="cv-form__label" for="archivo">Archivo PDF</label>
                <input class="cv-form__file" type="file" id="archivo" name="archivo" accept="application/pdf"/>
            </div>

            <div class="cv-form__actions">
                <button class="cv-form__button cv-form__button--submit" type="submit">Subir</button>
            </div>
        </form>


        <div class="cv-status">
            <p class="cv-status__message" th:if="${tieneCV}">Ya existe un CV cargado</p>
            <p class="cv-status__message" th:if="${!tieneCV}">No existe ningún CV cargado</p>

            <div class="cv-status__actions">
                <a class="cv-status__link" target="_blank" th:href="@{/presentation/oferente/verCV}">
                    <button class="cv-status__button" type="button" th:disabled="${!tieneCV}">Ver CV</button>
                </a>
            </div>
        </div>
    </div>
</main>

<footer class="page__footer" th:replace="presentation/fragments/Footer :: footer"></footer>
</body>
</html>
