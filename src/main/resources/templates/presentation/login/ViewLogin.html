<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login</title>
  <link rel="stylesheet" th:href="@{/css/styles.css}" type="text/css">
</head>

<body>
<header class="navbar">

  <div class="logo">
    <img src="/images/logo.png" alt="logo">
    <span>BolsaEmpleo</span>

    <nav>
      <a href="/">Buscar puestos</a>
      <a href="/presentation/empresa/registrar">Registro Empresa</a>
      <a href="/">Registro Oferente</a>
    </nav>

  </div>


  <div class="login">
    <a href="/">Login</a>
  </div>

</header>

<main>
  <div class="form-container">
    <h2>Sign up</h2>

    <form method="POST" th:object="${usuario}" th:action="@{/presentation/login/crearCuenta}" >

      <label>Identificador</label>
      <input type="text" th:field="*{idetificacion}" required>

      <label>Clave</label>
      <input type="text" th:field="*{clave}" required>

      <label>Tipo</label>
      <select th:field="*{tipo}" required>
        <option value="Empresa">Empresa</option>
        <option value="Administrador">Administrador</option>
        <option value="Oferente">Oferente</option>
      </select>

      <button type="submit">Sign up</button>

    </form>
    <br>
    <h2>Log in</h2>
    <form method="GET" th:object="${usuario}" th:action="@{/presentation/login/iniciarSesion}" >

      <label>Identificador</label>
      <input type="text" th:field="*{idetificacion}" required>

      <label>Clave</label>
      <input type="text" th:field="*{clave}" required>

      <button type="submit">Sign up</button>

    </form>
  </div>
</main>

<footer>

  <div>
    <strong>Bolsa de Empleo</strong><br>
    Total Soft Inc.
  </div>

  <div>
    Contacto: info@bolsaempleo.local<br>
    Créditos: Equipo de desarrollo
  </div>
</footer>
</body>

</html>
